name: Build and Deploy to IIS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # ─────────────────────────────────────────
      # 1. CHECKOUT
      # ─────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. RESTORE
      # ─────────────────────────────────────────
      - name: Restore dependencies
        run: dotnet restore TeachingBACKEND.sln
        shell: powershell

      # ─────────────────────────────────────────
      # 3. BUILD
      # ─────────────────────────────────────────
      - name: Build
        run: dotnet build TeachingBACKEND.sln --configuration Release --no-restore
        shell: powershell

      # ─────────────────────────────────────────
      # 4. TEST (saltato se non ci sono test projects)
      # ─────────────────────────────────────────
      - name: Test
        run: |
          $testProjects = Get-ChildItem -Recurse -Filter "*.csproj" |
            Where-Object { Select-String -Path $_.FullName -Pattern "IsTestProject" -Quiet }

          if ($testProjects.Count -gt 0) {
            Write-Host "Trovati $($testProjects.Count) progetto/i di test. Eseguo i test..."
            dotnet test TeachingBACKEND.sln --no-build --configuration Release --verbosity normal
          } else {
            Write-Host "Nessun progetto di test trovato, step saltato."
          }
        shell: powershell

      # ─────────────────────────────────────────
      # 5. PUBLISH
      # ─────────────────────────────────────────
      - name: Publish
        run: |
          dotnet publish TeachingBACKEND/TeachingBACKEND.csproj `
            --configuration Release `
            --output ./publish `
            --no-build
        shell: powershell

      # ─────────────────────────────────────────
      # 6. BACKUP PRE-DEPLOY
      # ─────────────────────────────────────────
      - name: Backup DB pre-deploy
        run: |
          $sha     = "${{ github.sha }}".Substring(0, 7)
          $date    = Get-Date -Format "yyyyMMdd_HHmmss"
          $file    = "C:\Backups\SQL\predeploy_${date}_${sha}.bak"
          Invoke-Sqlcmd `
            -ServerInstance "WIN-HUFFLG584VP\SQLEXPRESS" `
            -Username "sa" `
            -Password "${{ secrets.SA_PASSWORD }}" `
            -Query "BACKUP DATABASE [TeachingBACKEND] TO DISK = N'$file' WITH STATS = 10" `
            -QueryTimeout 300
          Write-Host "Backup pre-deploy creato: $file"
        shell: powershell

      # ─────────────────────────────────────────
      # 7. EF CORE MIGRATIONS
      # ─────────────────────────────────────────
      - name: Install EF Core tools
        run: |
          dotnet tool install --global dotnet-ef --version 8.0.* 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Già installato, aggiorno..."
            dotnet tool update --global dotnet-ef --version 8.0.*
          }
        shell: powershell

      - name: Apply EF Core migrations
        run: |
          dotnet ef database update `
            --project TeachingBACKEND/TeachingBACKEND.csproj `
            --startup-project TeachingBACKEND/TeachingBACKEND.csproj `
            --verbose
        shell: powershell
        env:
          # Inietta la connection string senza toccare il web.config di produzione.
          # La chiave deve corrispondere al nome usato nel DbContext: "DefaultConnection"
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}

      # ─────────────────────────────────────────
      # 7. STOP APP POOL
      # ─────────────────────────────────────────
      - name: Stop IIS App Pool
        run: |
          Import-Module WebAdministration
          Stop-WebAppPool -Name "${{ secrets.IIS_APP_POOL_NAME }}"
          Write-Host "App Pool '${{ secrets.IIS_APP_POOL_NAME }}' fermato."
        shell: powershell

      # ─────────────────────────────────────────
      # 8. DEPLOY FILES (web.config escluso)
      # ─────────────────────────────────────────
      - name: Deploy files to IIS
        run: |
          $src  = ".\publish"
          $dest = "${{ secrets.BACKEND_DEPLOY_PATH }}"

          Write-Host "Copio da '$src' a '$dest' (web.config escluso)..."

          robocopy $src $dest /MIR /XF web.config /R:3 /W:5 /NFL /NDL /NJH /NJS

          # robocopy: codici 0-7 = successo, 8+ = errore reale
          if ($LASTEXITCODE -le 7) {
            Write-Host "Robocopy completato (exit code: $LASTEXITCODE)."
            exit 0
          } else {
            Write-Error "Robocopy fallito (exit code: $LASTEXITCODE)."
            exit $LASTEXITCODE
          }
        shell: powershell

      # ─────────────────────────────────────────
      # 9. START APP POOL — always() per non lasciare il sito offline
      #    anche in caso di errore nei passi precedenti
      # ─────────────────────────────────────────
      - name: Start IIS App Pool
        if: always()
        run: |
          Import-Module WebAdministration
          Start-WebAppPool -Name "${{ secrets.IIS_APP_POOL_NAME }}"
          Write-Host "App Pool '${{ secrets.IIS_APP_POOL_NAME }}' avviato."
        shell: powershell

      # ─────────────────────────────────────────
      # 10. HEALTH CHECK
      # ─────────────────────────────────────────
      - name: Health check
        if: success()
        run: |
          $url = "https://app.braingainalbania.al/health"
          $retries = 12
          $delay = 5
          $success = $false

          for ($i = 1; $i -le $retries; $i++) {
            try {
              $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 10
              if ($response.StatusCode -eq 200) {
                Write-Host "Health check OK al tentativo $i"
                $success = $true
                break
              }
            } catch {
              Write-Host "Tentativo $i fallito: $_"
            }
            Start-Sleep -Seconds $delay
          }

          if (-not $success) {
            Write-Host "Health check fallito dopo $retries tentativi"
            exit 1
          }
        shell: powershell

      # ─────────────────────────────────────────
      # 11. NOTIFICA FINALE (sempre eseguita)
      # ─────────────────────────────────────────
      - name: Deployment summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          $icon    = if ($env:JOB_STATUS -eq "success") { "✅" } else { "❌" }
          $label   = if ($env:JOB_STATUS -eq "success") { "SUCCESSO" } else { "FALLITO" }
          $now     = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss")
          $sha     = "${{ github.sha }}".Substring(0, 7)

          $summary = @"
          ## $icon Deploy $label

          | | |
          |---|---|
          | **App**    | https://app.braingainalbania.al |
          | **Branch** | ${{ github.ref_name }} |
          | **Commit** | [$sha](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |
          | **Autore** | ${{ github.actor }} |
          | **Data**   | ${now} UTC |
          | **Run**    | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          "@

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8

          Write-Host ""
          Write-Host "=================================="
          Write-Host "  DEPLOY $label  $icon"
          Write-Host "=================================="
          Write-Host "  Commit : $sha"
          Write-Host "  Autore : ${{ github.actor }}"
          Write-Host "  Data   : ${now} UTC"
          Write-Host "=================================="
        shell: powershell
